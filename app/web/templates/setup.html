{% extends "base.html" %}
{% block title %}הגדרת פרטי Amazon — בוט{% endblock %}
{% block content %}
<h1>פרטי Amazon API</h1>
<p class="subtitle">הזן את פרטי החשבון שלך — הם מוצפנים ולא נגישים למפתח</p>

<form method="POST" action="{{ url_for('setup') }}">
    <div class="card">
        {% for key in client_keys %}
        <div class="field">
            <label for="{{ key }}">
                <span class="badge required">חובה</span>
                {{ labels.get(key, key) }}
            </label>
            <input type="{{ 'password' if 'SECRET' in key else 'text' }}"
                   id="{{ key }}" name="{{ key }}" required
                   value="{{ current.get(key, '') }}"
                   placeholder="{{ key }}">
        </div>
        {% endfor %}
    </div>

    <div class="actions">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">ביטול</a>
        <button type="submit" class="btn btn-primary">💾 שמור</button>
    </div>
</form>
{% endblock %}
