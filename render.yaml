services:
  - type: web
    name: pokemon-tcg-alert-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      # ── Auto-generated (don't touch) ──────────────────────────────
      - key: FLASK_SECRET
        generateValue: true
      - key: PANEL_ACCESS_TOKEN
        generateValue: true
      # ── Developer sets these ──────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      # ── Optional tuning ───────────────────────────────────────────
      - key: DB_PATH
        value: /data/bot.db
      - key: CHECK_INTERVAL_SECONDS
        value: "360"
      - key: CATALOG_REFRESH_HOURS
        value: "8"
      - key: MAX_PRICE_USD
        value: "180"
      # NOTE: Amazon API credentials (CREATORS_API_*) are entered by
      # the client via the web panel — NOT set here.
